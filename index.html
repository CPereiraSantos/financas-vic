<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Pro | Controle Pessoal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Finanças 💎</h1>
            <p>Controle simplificado de saldo e despesas</p>
        </header>

        <section class="resumo-grid">
            <div class="card-resumo glass">
                <span>💰 Salário Atual</span>
                <div class="input-inline">
                    <input type="number" id="saldo-disponivel" placeholder="0,00" step="0.01">
                    <button onclick="salvarSaldo()" id="btn-saldo">Registrar</button>
                </div>
            </div>
            <div class="card-resumo glass">
                <span>💸 Total em Despesas</span>
                <h2 id="total-geral">R$ 0,00</h2>
            </div>
            <div class="card-resumo glass">
                <span>📉 Saldo Restante</span>
                <h2 id="saldo-restante">R$ 0,00</h2>
            </div>
        </section>

        <section class="form-box glass">
            <h3>➕ Nova Despesa</h3>
            <form id="form-gasto">
                <div class="input-group">
                    <input type="text" id="desc" placeholder="Descrição (Ex: Luz)" required>
                    <input type="number" id="valor" placeholder="Valor" step="0.01" required>
                    <input type="date" id="data">
                    <button type="submit" id="btn-salvar">Adicionar</button>
                </div>
            </form>
        </section>

        <section class="lista-container glass">
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Vencimento</th>
                        <th>Valor</th>
                        <th style="text-align:right">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <tr>
                        <td colspan="4" style="text-align:center; color: var(--text-dim);">
                            Sincronizando dados...
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
